events {
    worker_connections 64;
}

http {
    # Only echo the origin back if it exactly matches the configured frontend URL.
    # Any other origin (or no origin) gets an empty string, so the browser blocks the response.
    map $http_origin $cors_origin {
        ${ALLOWED_ORIGIN}  $http_origin;
        default            "";
    }

    # Rate limit zones keyed on the session nonce forwarded by the Next.js proxy.
    # Each active session gets its own bucket - lab users on shared IPs are not penalised.
    limit_req_zone $http_x_session_id zone=uploads:10m rate=20r/m;
    limit_req_zone $http_x_session_id zone=plots:10m rate=12r/m;

    # Return JSON on 429 so the frontend error handler can display a friendly message
    limit_req_status 429;
    limit_req_log_level warn;

    upstream plumber {
        server 127.0.0.1:7861;
        server 127.0.0.1:7862;
    }

    server {
        listen 7860;

        # Allow large BED file uploads
        client_max_body_size 2000m;

        # Common proxy settings inherited by all locations
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 5s;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # CORS — only allowed origin gets the header; all others get nothing
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, GET, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Session-ID" always;

        # Handle preflight requests before they reach plumber
        if ($request_method = OPTIONS) {
            return 204;
        }

        # JSON body for rate-limit rejections
        error_page 429 @rate_limited;
        location @rate_limited {
            add_header Content-Type application/json always;
            add_header Access-Control-Allow-Origin $cors_origin always;
            return 429 '{"error":"Too many requests. Please wait a moment before trying again."}';
        }

        # File uploads - allow short bursts (e.g. uploading BED + MATS at once)
        location = /ingest {
            limit_req zone=uploads burst=5 nodelay;
            proxy_pass http://plumber;
        }

        # Analysis endpoints - more expensive, tighter limit
        location ~ ^/(plot-gene|plot-region|splicing-map|sequence-map)$ {
            limit_req zone=plots burst=3 nodelay;
            proxy_pass http://plumber;
        }

        # Health check and delete-upload pass through unrestricted
        location / {
            proxy_pass http://plumber;
        }
    }
}
